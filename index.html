<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ridho — @ridhogeprek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #f472b6;
    --rose-light: #fce7f3;
    --rose-deep: #db2777;
    --sky: #7dd3fc;
    --sky-deep: #38bdf8;
    --lilac: #c084fc;
    --bg: #fdf4fb;
    --text: #1a1025;
    --sub: #9178a8;
    --border: rgba(212, 170, 210, 0.25);
    --glass: rgba(255,255,255,0.72);
    --shadow-rose: rgba(244, 114, 182, 0.2);
    --shadow-sky: rgba(125, 211, 252, 0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── BACKGROUND OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(253, 244, 251, 0.55);
    backdrop-filter: blur(2px);
    z-index: 0;
    pointer-events: none;
  }

  /* ── GRAIN TEXTURE ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── MESH BACKGROUND ── */
  .bg-mesh {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-mesh span {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  .bg-mesh span:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(244,114,182,0.22) 0%, transparent 65%);
    top: -200px; right: -200px;
    animation: float1 12s ease-in-out infinite alternate;
  }
  .bg-mesh span:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(125,211,252,0.18) 0%, transparent 65%);
    bottom: -150px; left: -150px;
    animation: float2 15s ease-in-out infinite alternate;
  }
  .bg-mesh span:nth-child(3) {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(192,132,252,0.15) 0%, transparent 65%);
    top: 40%; left: 5%;
    animation: float1 9s ease-in-out infinite alternate;
  }
  .bg-mesh span:nth-child(4) {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 65%);
    top: 25%; right: 5%;
    animation: float2 11s ease-in-out infinite alternate;
  }
  @keyframes float1 { from{transform:translate(0,0) scale(1)} to{transform:translate(-25px,30px) scale(1.05)} }
  @keyframes float2 { from{transform:translate(0,0) scale(1)} to{transform:translate(22px,-28px) scale(0.97)} }

  /* ── SPARKLES ── */
  #sparkle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.6;
  }

  /* ── WRAPPER ── */
  .wrapper {
    max-width: 460px;
    width: 100%;
    position: relative;
    z-index: 2;
  }

  /* ── PROFILE ── */
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 0 40px;
    animation: fadeUp 0.8s 0.05s both;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 22px;
  }

  .avatar-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 0deg, var(--rose), var(--sky), var(--lilac), var(--rose));
    animation: spinGrad 4s linear infinite;
  }
  @keyframes spinGrad {
    to { filter: hue-rotate(360deg); }
  }

  .avatar {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(145deg, #fce7f3, #eff6ff, #f3e8ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 400;
    color: #b04080;
    border: 3px solid var(--bg);

  .avatar::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
    animation: sheen 3s ease-in-out infinite;
  }
  @keyframes sheen {
    0%   { transform: translateX(-100%) rotate(45deg); }
    30%  { transform: translateX(100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }

  .avatar-badge {
    position: absolute;
    bottom: 3px; right: 3px;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--rose-deep), var(--lilac));
    border-radius: 50%;
    border: 2.5px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    box-shadow: 0 2px 8px rgba(219,39,119,0.35);
    animation: pulse-badge 2.5s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 2px 8px rgba(219,39,119,0.35); }
    50%       { box-shadow: 0 2px 16px rgba(219,39,119,0.6); }
  }

  /* Online dot */
  .online-dot {
    position: absolute;
    top: 4px; left: 3px;
    width: 14px; height: 14px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
    50%       { opacity: 0.7; box-shadow: 0 0 14px rgba(74,222,128,0.9); }
  }

  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #1a1025, #6b21a8, #db2777);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 6px;
  }

  .profile-handle {
    font-size: 11px;
    font-weight: 500;
    color: var(--sub);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .profile-tagline {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    color: #9d7cc0;
    text-align: center;
    line-height: 1.7;
    max-width: 240px;
  }

  /* Status pill */
  .status-pill {
    display: inline-flex;

    margin-top: 16px;
    font-size: 11px;
    font-weight: 500;
    color: var(--sub);
    letter-spacing: 0.5px;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.6s 0.3s both;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.7);

  /* ── DIVIDER ── */

    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 28px;
    animation: fadeUp 0.7s 0.2s both;
  }
  .div-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,140,200,0.3));
  }
  .div-line.rev { background: linear-gradient(to left, transparent, rgba(200,140,200,0.3)); }
  .div-gem {
    width: 7px; height: 7px;
    background: linear-gradient(135deg, var(--rose), var(--sky));
    transform: rotate(45deg);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(244,114,182,0.5);
  }

  /* ── LINKS ── */
  .links { display: flex; flex-direction: column; gap: 11px; }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 15px 20px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s both;
  }

  /* Shimmer sweep on hover */
  .link-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transition: left 0s;
    transform: skewX(-15deg);
  }
  .link-card:hover::before {
    left: 150%;
    transition: left 0.55s ease;
  }

  /* Glow border on hover */
  .link-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(244,114,182,0.1), rgba(125,211,252,0.1));
    opacity: 0;
    transition: opacity 0.35s;
  }
  .link-card:hover {
    border-color: rgba(220,130,195,0.5);
    transform: translateY(-4px) scale(1.01);
    box-shadow:
      0 16px 40px var(--shadow-rose),
      0 6px 16px var(--shadow-sky),
      0 0 0 1px rgba(244,114,182,0.15);
  }
  .link-card:hover::after { opacity: 1; }
  .link-card:active { transform: translateY(-1px) scale(0.995); }

  .link-card:nth-child(1) { animation-delay: 0.2s; }
  .link-card:nth-child(2) { animation-delay: 0.28s; }
  .link-card:nth-child(3) { animation-delay: 0.36s; }
  .link-card:nth-child(4) { animation-delay: 0.44s; }
  .link-card:nth-child(5) { animation-delay: 0.52s; }
  .link-card:nth-child(6) { animation-delay: 0.60s; }

  .icon-wrap {
    width: 46px; height: 46px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .link-card:hover .icon-wrap { transform: scale(1.12) rotate(-4deg); }

  .icon-wrap.wa { background: linear-gradient(135deg, #bbf7d0, #86efac); box-shadow: 0 4px 12px rgba(134,239,172,0.35); }
  .icon-wrap.yt { background: linear-gradient(135deg, #fecaca, #f87171); box-shadow: 0 4px 12px rgba(248,113,113,0.35); }
  .icon-wrap.tt { background: linear-gradient(135deg, #fce7f3, #f9a8d4); box-shadow: 0 4px 12px rgba(249,168,212,0.35); }
  .icon-wrap.ig { background: linear-gradient(135deg, #fed7aa, #fbbf24); box-shadow: 0 4px 12px rgba(251,191,36,0.35); }
  .icon-wrap.rb { background: linear-gradient(135deg, #e9d5ff, #a78bfa); box-shadow: 0 4px 12px rgba(167,139,250,0.35); }
  .icon-wrap.dc { background: linear-gradient(135deg, #c7d2fe, #818cf8); box-shadow: 0 4px 12px rgba(99,102,241,0.35); }

  /* ── MUSIC PLAYER ── */

    margin-bottom: 28px;
    animation: fadeUp 0.7s 0.35s both;
  }
  .music-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    overflow: hidden;
  }
  .music-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .music-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #fecaca, #f87171);
    box-shadow: 0 4px 12px rgba(248,113,113,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .music-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text);
  }
  .music-card iframe {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 44px;
    animation: fadeUp 0.7s 0.65s both;
  }
  .footer-text {
    font-size: 10px;
    color: rgba(139,122,160,0.45);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .footer-gem {
    display: inline-block;
    width: 4px; height: 4px;
    background: linear-gradient(135deg, var(--rose), var(--sky));
    transform: rotate(45deg);
    margin: 0 8px;
    border-radius: 1px;
    vertical-align: middle;
    box-shadow: 0 0 4px rgba(244,114,182,0.4);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ico { width: 22px; height: 22px; }

  /* ── FLOATING DECO SHAPES ── */
  .deco {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: decoFloat linear infinite;
  }
  @keyframes decoFloat {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.8); }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(360deg) scale(1.2); }
  }

  /* ── CURSOR GLOW ── */
  #cursor-glow {
    position: fixed;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244,114,182,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    transition: left 0.12s ease, top 0.12s ease;
  }

  /* ── VISITOR COUNTER ── */
  .visit-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
    animation: fadeUp 0.6s 0.4s both;

    letter-spacing: 0.5px;

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.4;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.5s;
    animation: fadeUp 1s 1s both;

  .scroll-hint.hidden { opacity: 0; }
  .scroll-track {
    width: 1px; height: 32px;
    background: linear-gradient(to bottom, var(--rose), transparent);
    position: relative;
    overflow: hidden;
  }
  .scroll-track::after {
    content: '';
    position: absolute;
    top: -100%; left: 0;
    width: 100%; height: 100%;
    background: var(--rose);
    animation: scrollDrop 1.5s ease-in-out infinite;
  }
  @keyframes scrollDrop {
    0%   { top: -100%; opacity: 1; }
    100% { top: 100%;  opacity: 0; }
  }
  .scroll-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sub);
    font-weight: 500;
  }

  /* ── DECORATIVE CORNER ORNAMENTS ── */
  .corner-ornament {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
  }
  .corner-ornament.tl { top: 20px; left: 20px; }
  .corner-ornament.tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-ornament.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-ornament.br { bottom: 20px; right: 20px; transform: scale(-1); }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.18s both;

    font-size: 9px;
    letter-spacing: 3px;

    display: flex;

  .stat-item {

    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;

    opacity: 0.7;
  }
  .stat-sep {
    width: 1px;
    height: 28px;
    background: var(--border);
    align-self: center;
  }

</style>
</head>

<script>

// ── CURSOR GLOW ──
const glow = document.getElementById('cursor-glow');
window.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

// ── FLOATING DECO SHAPES ──
const DECO_CHARS = ['✦','✧','◆','◇','⬡','⬟','✿','❋','⊹','✺','⁕'];
function spawnDeco() {
  const el = document.createElement('div');
  el.className = 'deco';
  el.textContent = DECO_CHARS[Math.floor(Math.random() * DECO_CHARS.length)];
  const size = Math.random() * 12 + 8;
  const hue  = Math.random() > 0.5 ? 'var(--rose)' : (Math.random() > 0.5 ? 'var(--sky)' : 'var(--lilac)');
  el.style.cssText = `
    left: ${Math.random() * 100}vw;
    bottom: -30px;
    font-size: ${size}px;
    color: ${hue};
    animation-duration: ${Math.random() * 8 + 7}s;
    animation-delay: ${Math.random() * 4}s;
    opacity: 0;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 13000);
}
setInterval(spawnDeco, 1200);
for (let i = 0; i < 5; i++) spawnDeco();

// ── SCROLL HINT ──
const hint = document.getElementById('scrollHint');
window.addEventListener('scroll', () => {
  hint.classList.toggle('hidden', window.scrollY > 60);
}, { passive: true });

// ── FAKE VIEW COUNTER (localStorage sim w/ random) ──
const total = Math.floor(Math.random() * (120000 - 15000 + 1)) + 15000;
let display = 0;
const el = document.getElementById('viewCount');
const step = Math.ceil(total / 40);
const timer = setInterval(() => {
  display = Math.min(display + step, total);
  el.textContent = display.toLocaleString();
  if (display >= total) clearInterval(timer);
}, 40);


// ── SPARKLE ANIMATION ──
const canvas = document.getElementById('sparkle-canvas');
const ctx = canvas.getContext('2d');
let W, H, sparks = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['rgba(244,114,182,', 'rgba(125,211,252,', 'rgba(192,132,252,', 'rgba(253,224,71,'];

class Spark {
  constructor(mouse) {
    this.x = mouse ? mouse.x : Math.random() * W;
    this.y = mouse ? mouse.y : Math.random() * H;
    this.s = Math.random() * 1.8 + 0.5;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = Math.random() * -0.8 - 0.3;
    this.life = 1;
    this.decay = Math.random() * 0.008 + 0.004;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.type = Math.random() > 0.5 ? 'circle' : 'star';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color + this.life + ')';
    if (this.type === 'star') {
      drawStar(ctx, this.x, this.y, this.s * 1.5);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawStar(ctx, x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 4);
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    ctx.lineTo(r, 0);
    ctx.lineTo(r * 0.2, r * 0.2);
    ctx.rotate(Math.PI / 2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Ambient sparks
setInterval(() => {
  if (sparks.length < 80) sparks.push(new Spark(null));
}, 180);

// Mouse trail
window.addEventListener('mousemove', e => {
  if (Math.random() > 0.4) sparks.push(new Spark({ x: e.clientX, y: e.clientY }));
});

function loop() {
  ctx.clearRect(0, 0, W, H);
  sparks = sparks.filter(s => s.life > 0);
  sparks.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(loop);
}
loop();
</script>
